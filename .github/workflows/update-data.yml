name: Update trade mark data

on:
  schedule:
    - cron: "27 9 * * 1"
  workflow_dispatch:
    inputs:
      privacy_mode:
        description: Audit only, fail on any match, or quarantine a bounded set
        required: true
        type: choice
        default: audit
        options:
          - audit
          - strict
          - quarantine

permissions:
  contents: write

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  PRIVACY_MODE: ${{ inputs.privacy_mode || 'quarantine' }}

concurrency:
  group: update-trade-mark-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out public repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out restricted trade mark state
        if: env.PRIVACY_MODE != 'audit'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ secrets.RESTRICTED_STATE_REPOSITORY }}
          path: .restricted-state
          ssh-key: ${{ secrets.RESTRICTED_STATE_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install -e '.[dev]'

      - name: Prepare isolated production build root
        env:
          BUILD_ROOT: ${{ runner.temp }}/marksignal-production
        run: |
          mkdir -p "$BUILD_ROOT"
          cp -R site "$BUILD_ROOT/site"

      - name: Download current IP RAPID archive
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/iprapid.zip
        run: >-
          curl --fail --location
          --retry 5 --retry-all-errors --retry-delay 10
          --connect-timeout 30 --max-time 3600
          --output "$ARCHIVE_PATH"
          https://data.gov.au/data/dataset/423000b8-5735-4447-bcb9-792644bcd7ea/resource/c79b3af6-3720-44ac-9e39-6a68f5635924/download/iprapid.zip

      - name: Audit selected filing privacy
        if: env.PRIVACY_MODE == 'audit'
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/iprapid.zip
        run: marksignal audit-iprapid "$ARCHIVE_PATH"

      - name: Select watched filings into restricted state
        if: env.PRIVACY_MODE != 'audit'
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/iprapid.zip
          BUILD_ROOT: ${{ runner.temp }}/marksignal-production
        run: >-
          marksignal
          --root "$BUILD_ROOT"
          --watchlists "$GITHUB_WORKSPACE/watchlists"
          --data-root "$GITHUB_WORKSPACE/.restricted-state"
          ingest-iprapid "$ARCHIVE_PATH"
          --privacy-mode "$PRIVACY_MODE"

      - name: Verify generated result
        run: |
          ruff check .
          mypy src
          pytest --cov=marksignal --cov-report=term-missing --cov-fail-under=80
          pip-audit --skip-editable
          marksignal validate-watchlists

      - name: Set up Node.js
        if: env.PRIVACY_MODE != 'audit'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Set up npm
        if: env.PRIVACY_MODE != 'audit'
        run: npm install --global npm@12.0.1

      - name: Verify isolated production site
        if: env.PRIVACY_MODE != 'audit'
        env:
          BUILD_ROOT: ${{ runner.temp }}/marksignal-production
        working-directory: ${{ runner.temp }}/marksignal-production/site
        run: |
          npm ci
          npm run check
          npm audit --audit-level=high
          npm run build

      - name: Commit restricted state when changed
        if: env.PRIVACY_MODE != 'audit'
        run: |
          git -C .restricted-state add data
          if git -C .restricted-state diff --cached --quiet; then
            echo "Selected trade mark state is unchanged."
          else
            git -C .restricted-state config user.name "marksignal-bot"
            git -C .restricted-state config user.email "marksignal-bot@users.noreply.github.com"
            git -C .restricted-state commit \
              -m "Refresh selected trade mark state" \
              -m "Process the current IP RAPID archive for watched organisation aliases. Preserve source provenance, immutable observations, deterministic signal reasons, and privacy-minimised durable state after the verified build."
            git -C .restricted-state push
          fi

      - name: Publish non-identifying update status
        if: env.PRIVACY_MODE != 'audit'
        run: |
          DATA_REVISION=$(git -C .restricted-state rev-parse HEAD)
          marksignal \
            --data-root .restricted-state \
            publish-status \
            --data-revision "$DATA_REVISION"
          git config user.name "marksignal-bot"
          git config user.email "marksignal-bot@users.noreply.github.com"
          git add site/src/data/update-status.json
          if git diff --cached --quiet; then
            echo "Public update status is unchanged."
            exit 0
          fi
          git commit \
            -m "Record verified dataset update" \
            -m "Publish non-identifying retrieval and dataset counts for the latest verified state revision. Trigger a fresh static deployment without committing selected filings, observations, or evidence to public version control."
          git push
