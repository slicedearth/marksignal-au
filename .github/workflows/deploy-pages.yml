name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ASTRO_TELEMETRY_DISABLED: "1"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out public repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect restricted-state configuration
        env:
          STATE_KEY: ${{ secrets.RESTRICTED_STATE_DEPLOY_KEY }}
          STATE_REPOSITORY: ${{ secrets.RESTRICTED_STATE_REPOSITORY }}
        run: |
          if [ -n "$STATE_KEY" ] && [ -n "$STATE_REPOSITORY" ]; then
            echo "HAS_RESTRICTED_STATE=true" >> "$GITHUB_ENV"
          else
            echo "HAS_RESTRICTED_STATE=false" >> "$GITHUB_ENV"
            echo "Restricted state is not configured; deploying the fictional demonstration dataset."
          fi

      - name: Check out restricted trade mark state
        if: env.HAS_RESTRICTED_STATE == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ secrets.RESTRICTED_STATE_REPOSITORY }}
          path: .restricted-state
          ssh-key: ${{ secrets.RESTRICTED_STATE_DEPLOY_KEY }}

      - name: Set up Python
        if: env.HAS_RESTRICTED_STATE == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Generate production site from restricted state
        if: env.HAS_RESTRICTED_STATE == 'true'
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install -e .
          marksignal --data-root .restricted-state rebuild-site

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Set up npm
        run: npm install --global npm@12.0.1

      - name: Build static site
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
