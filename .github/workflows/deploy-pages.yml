name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ASTRO_TELEMETRY_DISABLED: "1"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out public repository without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect restricted-state configuration
        env:
          STATE_KEY: ${{ secrets.RESTRICTED_STATE_READ_KEY }}
          STATE_REPOSITORY: ${{ secrets.RESTRICTED_STATE_REPOSITORY }}
        run: |
          if [ -n "$STATE_KEY" ] && [ -n "$STATE_REPOSITORY" ]; then
            echo "HAS_RESTRICTED_STATE=true" >> "$GITHUB_ENV"
          else
            echo "HAS_RESTRICTED_STATE=false" >> "$GITHUB_ENV"
            echo "Restricted state is not configured; deploying the fictional demonstration dataset."
          fi

      - name: Set up Python before state access
        if: env.HAS_RESTRICTED_STATE == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline before state access
        if: env.HAS_RESTRICTED_STATE == 'true'
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install -e .

      - name: Check out restricted state with read-only access
        if: env.HAS_RESTRICTED_STATE == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ secrets.RESTRICTED_STATE_REPOSITORY }}
          path: .restricted-state
          ssh-key: ${{ secrets.RESTRICTED_STATE_READ_KEY }}
          persist-credentials: false

      - name: Generate production site from restricted state
        if: env.HAS_RESTRICTED_STATE == 'true'
        run: marksignal --data-root .restricted-state rebuild-site

      - name: Transfer generated public site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-public-site
          path: site
          if-no-files-found: error
          retention-days: 1

  build:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download generated public site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-public-site
          path: site

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install and build static site
        working-directory: site
        run: |
          npm install --global npm@12.0.1
          npm ci
          npm run build
          npm run check:security

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
